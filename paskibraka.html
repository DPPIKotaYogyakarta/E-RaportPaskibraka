<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Paskibraka - Raport Digital</title>
    
    <!-- ========================================== -->
    <!-- SHARED CSS & LIBRARIES -->
    <!-- ========================================== -->
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/a/a0/Logo_dppi_512.png">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        :root { --gold-primary: #D4AF37; --gold-light: #FFD700; --gold-glow: rgba(255, 215, 0, 0.4); --blue-royal: #1e3a8a; --blue-neon: #3b82f6; }
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #f8fafc; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -2; opacity: 0.5; animation: pulse-light 8s infinite alternate ease-in-out; }
        .light-gold { top: -10%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, var(--gold-primary), transparent 70%); }
        .light-blue { bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, var(--blue-royal), transparent 70%); animation-delay: -4s; }
        @keyframes pulse-light { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(1.1); opacity: 0.6; } }
        .os-window { background: rgba(20, 25, 40, 0.6); backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.3); border-left: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.05); transform-style: preserve-3d; transform: translateZ(0); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .os-input, .os-select { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .os-input:focus, .os-select:focus { border-color: var(--gold-light); box-shadow: 0 0 15px var(--gold-glow), inset 0 2px 5px rgba(0,0,0,0.5); outline: none; background: rgba(0, 0, 0, 0.7); }
        .os-input:disabled, .os-select:disabled { opacity: 0.5; cursor: not-allowed; background: rgba(0,0,0,0.6); }
        .btn-gold { background: linear-gradient(135deg, #b45309 0%, #D4AF37 50%, #FFD700 100%); color: #000; font-weight: 800; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3), inset 0 1px 0 rgba(255,255,255,0.4); transition: transform 0.1s ease, box-shadow 0.2s ease; }
        .btn-gold:active { transform: scale(0.98); } .btn-gold:disabled { opacity: 0.7; cursor: not-allowed; filter: grayscale(0.5); }
        .text-gold-gradient { background: linear-gradient(to right, #F3E5AB, #FFD700, #D4AF37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5)); }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #FFD700; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-in { animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; } .custom-scrollbar::-webkit-scrollbar-track { background: transparent; } .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; } .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: var(--gold-primary); }
        .lightbox-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; animation: fadeIn 0.3s; flex-direction: column; backdrop-filter: blur(10px); }
        .lightbox-content { position: relative; max-width: 90%; max-height: 80vh; display: flex; justify-content: center; align-items: center; width: 100%; }
        .lightbox-img { max-width: 100%; max-height: 80vh; border: 2px solid var(--gold-primary); box-shadow: 0 0 50px rgba(212, 175, 55, 0.5); border-radius: 10px; }
        .lightbox-badge { position: absolute; bottom: -15px; right: -10px; padding: 5px 15px; border-radius: 999px; font-size: 14px; z-index: 10001; box-shadow: 0 5px 15px rgba(0,0,0,0.5); background: #D4AF37; color: black; font-weight: bold; border: 1px solid white; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 2rem; cursor: pointer; z-index: 10002; background: rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); }
        .badge-base { font-weight:800; text-transform:uppercase; letter-spacing:0.05em; border:1px solid rgba(255,255,255,0.3); }
        .badge-kota { background:linear-gradient(135deg, #00C851, #007E33); color:white; }
        .badge-provinsi { background:linear-gradient(135deg, #33b5e5, #0099CC); color:white; }
        .badge-nasional { background:linear-gradient(135deg, #ff4444, #CC0000); color:white; }
        .badge-gold { background:linear-gradient(135deg, #FFD700, #B8860B); color:black; border-color:#FFFACD; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const LOGO_DPPI = "https://upload.wikimedia.org/wikipedia/commons/3/36/Logo_DPPI.png";
        const LOGO_YOGYA = "https://upload.wikimedia.org/wikipedia/commons/d/db/Logo_Pemkot_Yk.png"; 
        const LOGO_PASKIB = "https://upload.wikimedia.org/wikipedia/commons/d/dc/Logo_paskibraka.png";

        // --- KONFIGURASI API GITHUB PAGES ---
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby-SDIVGlVnxO8e1H34gmo_R_C3v1bvJlv6X-wIfzGUmIbqwTapwQaKhDufzF7AOW6dcg/exec"; // GANTI DENGAN URL DEPLOY ANDA

        // --- API BRIDGE ---
        const api = {
            run: async (funcName, ...args) => {
                return new Promise(async (resolve, reject) => {
                    try {
                        let payload = {};
                        // Map args array to payload object based on function name
                        if (funcName === 'loginUser') payload = { username: args[0], password: args[1], type: args[2] };
                        else if (funcName === 'updateProfile') payload = { role: args[0], id: args[1], newData: args[2] };
                        else if (funcName === 'getEvaluasiByDate') payload = { nik: args[0] };
                        else if (funcName === 'getStarHistory') payload = { nik: args[0] };
                        else if (funcName === 'getReplies') payload = { evalId: args[0] };
                        else if (funcName === 'submitReply') payload = { evalId: args[0], nik: args[1], text: args[2] };
                        else if (funcName === 'addTrainingFeedback') payload = args[0];

                        const response = await fetch(GAS_WEB_APP_URL, {
                            method: "POST", redirect: "follow",
                            headers: { "Content-Type": "text/plain;charset=utf-8" },
                            body: JSON.stringify({ action: funcName, payload: payload })
                        });
                        const result = await response.json();
                        
                        if (result.status === 'success' || result.status === 'error') {
                            if(result.status === 'error') reject(result.message);
                            else resolve(result.data !== undefined ? result.data : result);
                        } else resolve(result);
                    } catch (error) {
                        reject("Gagal terhubung ke server database.");
                    }
                });
            }
        };

        // --- SHARED COMPONENTS ---
        const getBadgeClass = (penugasan) => {
            if (!penugasan) return 'badge-kota'; 
            const p = penugasan.toLowerCase();
            if (p.includes('provinsi')) return 'badge-provinsi';
            if (p.includes('nasional')) return 'badge-nasional';
            return 'badge-kota'; 
        };

        function Background3D() {
            return (
                <>
                    <div className="ambient-light light-gold"></div>
                    <div className="ambient-light light-blue"></div>
                </>
            );
        }

        function StarRating({ count, size = "text-xs" }) {
            const numCount = parseInt(count) || 0;
            if (numCount < 0) return (<div className={`flex items-center gap-1 ${size} text-red-500 font-bold`}><i className="fas fa-minus-circle"></i><span>{Math.abs(numCount)} BINTANG</span></div>);
            const starCount = Math.max(0, Math.min(5, numCount));
            return (<div className={`flex gap-0.5 ${size} text-[#FFD700]`}>{[...Array(5)].map((_, i) => (<i key={i} className={`${i < starCount ? "fas" : "far"} fa-star drop-shadow-[0_0_2px_rgba(255,215,0,0.5)]`}></i>))}</div>);
        }

        function MediaModal({ src, badgeText, badgeClass, onClose }) {
            if (!src) return null;
            const isVideo = src.startsWith("data:video/") || src.toLowerCase().match(/\.(mp4|webm|ogg|mov)(\?|$)/i);
            return (
                <div className="lightbox-overlay" onClick={onClose}>
                    <div className="lightbox-close" onClick={onClose}><i className="fas fa-times"></i></div>
                    <div className="lightbox-content" onClick={(e) => e.stopPropagation()}>
                        {isVideo ? <video controls autoPlay playsInline className="lightbox-img bg-black" style={{ width: '100%', maxHeight: '80vh' }}><source src={src} />Browser Anda tidak mendukung tag video.</video> : <img src={src} className="lightbox-img" />}
                        {badgeText && <div className={`lightbox-badge badge-base ${badgeClass}`}>{badgeText}</div>}
                    </div>
                </div>
            );
        }

        function PasswordDisplay({ password }) {
            const [show, setShow] = useState(false);
            return (
                <div className="flex justify-between items-center w-full">
                    <span className={show ? "font-mono font-bold text-white drop-shadow-md" : "font-mono font-bold text-slate-500"}>{show ? password : "••••••••"}</span>
                    <button onClick={() => setShow(!show)} className="text-xs text-gold-primary hover:text-white transition drop-shadow-md"><i className={`fas ${show ? 'fa-eye-slash' : 'fa-eye'}`}></i></button>
                </div>
            );
        }

        function StatusBadge({ status }) {
            let colorClass = 'bg-gray-500/20 text-gray-400 border-gray-500/30';
            if (status === 'Active') colorClass = 'bg-green-500/20 text-green-400 border-green-500/30 shadow-[0_0_10px_rgba(74,222,128,0.2)]';
            else if (status === 'Pending') colorClass = 'bg-orange-500/20 text-orange-400 border-orange-500/30';
            else if (status === 'Blocked' || status === 'Non-Active') colorClass = 'bg-red-500/20 text-red-400 border-red-500/30';
            return <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase border ${colorClass}`}>{status}</span>;
        }

        function FullProfileCard({ user, type }) {
            const isPaskib = type === 'paskibraka';
            const badgeClass = isPaskib ? getBadgeClass(user.penugasan) : 'badge-gold';
            return (
                <div className="space-y-3 text-sm animate-in">
                    <div className="bg-white/5 rounded-xl border border-white/10 overflow-hidden shadow-lg backdrop-blur-sm">
                        <div className="bg-white/5 p-2 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-white/5">DATA UTAMA</div>
                        <div className="p-4 space-y-3">
                            <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-400">Peran</span><span className="font-bold text-gold-primary uppercase drop-shadow">{type}</span></div>
                            <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-400">{isPaskib ? 'NIK' : 'Username'}</span><span className="font-bold text-white drop-shadow">{isPaskib ? user.nik : user.username}</span></div>
                            <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-400">Nama Lengkap</span><span className="font-bold text-white text-right drop-shadow">{user.nama}</span></div>
                            <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-400">Nama Lapangan</span><span className="font-bold text-gold-gradient">{user.lapangan}</span></div>
                            <div className="flex justify-between items-center"><span className="text-slate-400">Status Akun</span><StatusBadge status={user.status} /></div>
                        </div>
                    </div>
                    <div className="bg-white/5 rounded-xl border border-white/10 overflow-hidden shadow-lg backdrop-blur-sm">
                        <div className="bg-white/5 p-2 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-white/5">DETAIL & KEAMANAN</div>
                        <div className="p-4 space-y-3">
                            {isPaskib ? (
                                <><div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-400">Asal Sekolah</span><span className="font-bold text-white text-right drop-shadow">{user.sekolah}</span></div><div className="flex justify-between items-center border-b border-white/5 pb-2"><span className="text-slate-400">Penugasan</span><span className={`px-2 py-0.5 rounded text-[10px] font-bold ${badgeClass} badge-base`}>{user.penugasan}</span></div></>
                            ) : (
                                <div className="flex justify-between items-center border-b border-white/5 pb-2"><span className="text-slate-400">Jabatan</span><span className={`px-2 py-0.5 rounded text-[10px] font-bold ${badgeClass} badge-base`}>{user.jabatan}</span></div>
                            )}
                            <div className="flex flex-col gap-1"><span className="text-slate-400 text-xs">Password</span><div className="bg-black/30 p-2 rounded border border-white/5 inner-shadow"><PasswordDisplay password={user.password} /></div></div>
                        </div>
                    </div>
                </div>
            );
        }

        function TrainingFeedbackForm({ user, role, onBack }) {
            const today = new Date().toISOString().split('T')[0];
            const [form, setForm] = useState({ aspect: 'Umum', rating: 5, content: '', date: today });
            const [loading, setLoading] = useState(false);
            const ASPECTS = ['Umum', 'Materi Latihan', 'Fisik & Stamina', 'Kedisiplinan', 'Konsumsi/Logistik', 'Sarana Prasarana'];

            const handleSubmit = () => {
                if (!form.content) return alert("Mohon isi detail masukan/evaluasi.");
                setLoading(true);
                const now = new Date();
                const payload = {
                    role: role === 'paskibraka' ? 'Paskibraka' : 'Pelatih',
                    senderName: user.nama, date: form.date, 
                    time: now.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}),
                    aspect: form.aspect, rating: form.rating, content: form.content
                };
                api.run('addTrainingFeedback', payload).then(res => {
                    setLoading(false); alert(res.message || "Berhasil dikirim!"); onBack();
                }).catch(e => { setLoading(false); alert("Gagal: " + e); });
            };

            return (
                <div className="os-window p-0 rounded-[2rem] h-[85vh] flex flex-col overflow-hidden animate-in">
                    <div className="p-6 border-b border-white/10 bg-[#050505]/80 backdrop-blur-xl z-10 flex-none text-center">
                        <h3 className="font-black text-white uppercase tracking-tight text-lg">EVALUASI PELATIHAN</h3>
                        <p className="text-[10px] text-slate-400">Feedback harian untuk kemajuan bersama</p>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-5 custom-scrollbar">
                        <div><label className="block text-slate-400 text-xs font-bold mb-2">Tanggal Latihan</label><input type="date" className="w-full p-2 os-input rounded-xl text-sm" value={form.date} onChange={e => setForm({...form, date: e.target.value})} /></div>
                        <div><label className="block text-slate-400 text-xs font-bold mb-2">Aspek Evaluasi</label><div className="grid grid-cols-2 gap-2">{ASPECTS.map(a => (<button key={a} onClick={() => setForm({...form, aspect: a})} className={`py-2 px-1 rounded-lg text-[10px] font-bold border transition ${form.aspect === a ? 'bg-[#FFD700] text-black border-[#FFD700]' : 'bg-white/5 border-white/10 text-slate-400'}`}>{a}</button>))}</div></div>
                        <div className="bg-white/5 border border-white/10 p-4 rounded-xl text-center">
                            <label className="block text-slate-400 text-xs font-bold mb-3">Rating Pelaksanaan</label>
                            <div className="flex justify-center gap-3">{[1, 2, 3, 4, 5].map(star => (<i key={star} onClick={() => setForm({...form, rating: star})} className={`fas fa-star text-3xl cursor-pointer transition ${star <= form.rating ? 'text-[#FFD700] drop-shadow-[0_0_10px_rgba(255,215,0,0.6)]' : 'text-slate-700'}`}></i>))}</div>
                            <div className="text-xs font-bold text-[#FFD700] mt-2">{form.rating} / 5 Bintang</div>
                        </div>
                        <div><label className="block text-slate-400 text-xs font-bold mb-2">Detail Masukan / Kritik / Saran</label><textarea rows="5" className="w-full p-4 os-input rounded-xl text-sm" placeholder="Tuliskan evaluasi Anda..." value={form.content} onChange={e => setForm({...form, content: e.target.value})}></textarea></div>
                    </div>
                    <div className="p-4 border-t border-white/10 bg-[#050505]/80 z-10 flex-none flex gap-3">
                        <button disabled={loading} onClick={onBack} className="flex-1 py-3 text-xs font-bold text-slate-400 hover:text-white">BATAL</button>
                        <button disabled={loading} onClick={handleSubmit} className="flex-1 btn-gold py-3 rounded-xl text-xs font-bold">{loading ? "MENGIRIM..." : "KIRIM EVALUASI"}</button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // APP PASKIBRAKA UTAMA
        // ==========================================

        function PaskibApp() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [lightboxData, setLightboxData] = useState(null);

            useEffect(() => {
                const stored = localStorage.getItem('currentUser');
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if(parsed.role !== 'paskibraka') { alert("Akses Ditolak"); window.location.href = "index.html"; }
                    else setUser(parsed.data);
                } else {
                    window.location.href = "index.html";
                }
            }, []);

            const handleLogout = () => {
                localStorage.removeItem('currentUser');
                window.location.href = "index.html";
            };

            const handleRefreshProfile = async () => {
                if (!user) return; setLoading(true);
                try {
                    const res = await api.run('loginUser', user.nik, user.password, 'paskibraka');
                    setUser(res); 
                    localStorage.setItem('currentUser', JSON.stringify({role:'paskibraka', data:res}));
                    alert("Data Profil Tersinkronisasi"); 
                } catch(e) { console.error(e); } setLoading(false);
            };

            const openPhoto = (src, badgeText, badgeClass) => { if(src) setLightboxData({ src, badgeText, badgeClass }); };

            const handleShowStarHistory = async (nik) => {
                setLoading(true);
                try {
                    const history = await api.run('getStarHistory', nik);
                    setView({ name: 'star-history', data: history });
                } catch(e) { console.error(e); alert("Gagal memuat riwayat bintang"); }
                setLoading(false);
            };

            const handleEditSuccess = (newPass) => {
                alert("Password berhasil diubah. Silakan Login Ulang.");
                handleLogout();
            };

            if (!user) return <div className="flex h-screen items-center justify-center"><div className="loader"></div></div>;

            return (
                 <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <Background3D />
                    <div className="w-full max-w-lg relative z-0 mt-4 mb-4">
                        {view === 'home' && <PaskibDashboard user={user} onLogout={handleLogout} onViewEvals={() => setView('eval-list')} onEditProfile={() => setView('edit-profile')} onRefresh={handleRefreshProfile} loading={loading} onPhotoClick={openPhoto} onShowStarHistory={handleShowStarHistory} onTrainingFeedback={() => setView('training-feedback')} />}
                        {view === 'eval-list' && <PaskibEvalList user={user} onBack={() => setView('home')} onSelectDate={(data) => setView({ name: 'eval-detail', data })} />}
                        {view === 'edit-profile' && <EditProfile user={user} role="paskibraka" onBack={() => setView('home')} onSuccess={handleEditSuccess} />}
                        {view?.name === 'eval-detail' && <PaskibEvalDetail data={view.data} user={user} onBack={() => setView('eval-list')} onPhotoClick={openPhoto} />}
                        {view?.name === 'star-history' && <StarHistoryList data={view.data} onBack={() => setView('home')} />}
                        {view === 'training-feedback' && <TrainingFeedbackForm user={user} role="paskibraka" onBack={() => setView('home')} />}
                    </div>
                    <MediaModal src={lightboxData?.src} badgeText={lightboxData?.badgeText} badgeClass={lightboxData?.badgeClass} onClose={() => setLightboxData(null)} />
                </div>
            );
        }

        // --- DASHBOARD COMPONENTS ---
        function PaskibDashboard({ user, onLogout, onViewEvals, onEditProfile, onRefresh, loading, onPhotoClick, onShowStarHistory, onTrainingFeedback }) {
            const emblemClass = getBadgeClass(user.penugasan);
            const [bioEnabled, setBioEnabled] = useState(localStorage.getItem('paskib_bio_enabled') === 'true');

            const toggleBiometric = () => {
                const newState = !bioEnabled;
                setBioEnabled(newState);
                localStorage.setItem('paskib_bio_enabled', newState);
                
                if (newState) {
                    localStorage.setItem('bio_creds', JSON.stringify({ user: user.nik, pass: user.password, role: 'paskibraka' }));
                    alert("Login Cepat (Biometrik UI) berhasil diaktifkan!");
                } else {
                    localStorage.removeItem('bio_creds');
                    alert("Login Cepat dinonaktifkan.");
                }
            };

            return (
                <div className="os-window p-5 rounded-[2rem] h-[85vh] animate-in flex flex-col relative">
                    <div className="flex-none mb-4 flex justify-between items-center border-b border-white/10 pb-4">
                        <h2 className="text-lg font-black text-white">DASHBOARD</h2>
                        <div className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider text-white badge-base ${emblemClass}`}>{user.penugasan}</div>
                    </div>
                    <div className="flex-1 overflow-y-auto custom-scrollbar space-y-6 p-1">
                         <div className="bg-black/40 border border-white/10 rounded-[2rem] p-6 text-center relative overflow-hidden group">
                             <div className="relative inline-block mt-2 mb-4 cursor-pointer" onClick={() => onPhotoClick(user.foto, user.penugasan, emblemClass)}>
                                <div className="absolute inset-0 bg-gradient-to-r from-[#D4AF37] to-[#FFD700] rounded-full blur-md opacity-40 group-hover:opacity-60 transition duration-500"></div>
                                <img src={user.foto} className="w-28 h-28 rounded-full border-2 border-[#FFD700] object-cover relative z-10 shadow-[0_0_20px_rgba(255,215,0,0.3)] group-hover:scale-105 transition duration-300" />
                            </div>
                            <h2 className="text-xl font-black text-white tracking-tight drop-shadow-md">{user.nama}</h2>
                            <p className="text-[#FFD700] text-sm font-bold tracking-wide mb-1 drop-shadow-sm">{user.lapangan}</p>
                             <div className="flex justify-center gap-2 mt-4">
                                <button onClick={onEditProfile} className="px-4 py-1.5 rounded-full border border-white/20 text-[10px] font-bold hover:bg-white/10 transition">EDIT PROFIL</button>
                                <button onClick={onRefresh} className="px-3 py-1.5 rounded-full border border-blue-500/30 text-[10px] font-bold hover:bg-blue-500/20 text-blue-400 transition flex items-center gap-1">{loading ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-sync"></i>} SYNC</button>
                            </div>
                        </div>

                        {/* TOTAL BINTANG CARD */}
                        <div onClick={() => !loading && onShowStarHistory(user.nik)} className="bg-gradient-to-r from-black/60 to-[#FFD700]/10 border border-[#FFD700]/30 rounded-2xl p-4 flex items-center justify-between shadow-[0_0_15px_rgba(212,175,55,0.1)] cursor-pointer hover:border-[#FFD700] transition group">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-[#FFD700] flex items-center justify-center text-black shadow-[0_0_10px_#FFD700] group-hover:scale-110 transition">
                                    <i className="fas fa-star text-lg"></i>
                                </div>
                                <div>
                                    <div className="text-[10px] text-slate-400 uppercase tracking-widest font-bold group-hover:text-white">TOTAL BINTANG</div>
                                    <div className="text-xs text-slate-500 group-hover:text-slate-300">Klik untuk riwayat</div>
                                </div>
                            </div>
                            <div className="text-3xl font-black text-white drop-shadow-[0_0_5px_rgba(255,215,0,0.8)]">
                                {loading ? <i className="fas fa-spinner fa-spin text-2xl"></i> : (user.totalStars || 0)}
                            </div>
                        </div>

                        <FullProfileCard user={user} type="paskibraka" />

                        {/* PANEL BIOMETRIK */}
                        <div className="bg-black/40 border border-white/10 rounded-2xl p-4 flex justify-between items-center mt-3 shadow-lg">
                            <div className="flex items-center gap-3">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${bioEnabled ? 'bg-green-500/20 text-green-400 shadow-[0_0_10px_rgba(74,222,128,0.3)]' : 'bg-white/10 text-slate-400'}`}>
                                    <i className="fas fa-fingerprint text-xl"></i>
                                </div>
                                <div>
                                    <div className="text-xs font-bold text-white uppercase">Login Biometrik</div>
                                    <div className="text-[9px] text-slate-400">Sidik Jari / Face ID</div>
                                </div>
                            </div>
                            <button onClick={toggleBiometric} className={`px-4 py-2 rounded-lg text-[10px] font-bold transition ${bioEnabled ? 'bg-red-500/20 text-red-400 border border-red-500/30 hover:bg-red-500/30' : 'bg-green-500/20 text-green-400 border border-green-500/30 hover:bg-green-500/30'}`}>
                                {bioEnabled ? 'MATIKAN' : 'AKTIFKAN'}
                            </button>
                        </div>
                        
                        <div className="space-y-3 pb-4">
                            <button onClick={onViewEvals} className="w-full btn-gold py-4 rounded-2xl flex items-center justify-between px-6 shadow-lg shadow-yellow-900/20 hover:translate-y-[-2px] transition-transform"><span className="font-black tracking-widest text-sm">LIHAT EVALUASI</span><i className="fas fa-chevron-right"></i></button>
                            <button onClick={onTrainingFeedback} className="w-full mt-3 bg-gradient-to-r from-blue-600 to-blue-500 py-3 rounded-2xl flex items-center justify-center gap-2 shadow-lg border border-blue-400/30"><i className="fas fa-bullhorn text-white"></i><span className="font-black text-white text-xs tracking-widest">EVALUASI PELATIHAN</span></button>
                            <button onClick={onLogout} className="w-full bg-black/40 border border-red-500/30 text-red-500 py-3 rounded-2xl text-xs font-bold hover:bg-red-500/10 transition">LOGOUT SYSTEM</button>
                        </div>
                    </div>
                </div>
            );
        }

        function PaskibEvalList({ user, onBack, onSelectDate }) {
            const [evals, setEvals] = useState(null); 
            const [search, setSearch] = useState(''); 
            
            const loadData = () => { setEvals(null); api.run('getEvaluasiByDate', user.nik).then(setEvals); }; 
            useEffect(() => { loadData(); }, []); 
            
            const filteredKeys = evals ? Object.keys(evals).filter(k => { 
                const q = search.toLowerCase(); const item = evals[k]; 
                if (item.display.toLowerCase().includes(q)) return true; 
                return item.list.some(d => d.pelatih.toLowerCase().includes(q) || d.waktu.toLowerCase().includes(q) || d.koreksiTehnik.toLowerCase().includes(q)); 
            }) : [];

            return (
                <div className="os-window p-0 rounded-[2rem] h-[80vh] flex flex-col overflow-hidden relative">
                    <div className="p-4 border-b border-white/10 bg-[#050505]/80 backdrop-blur-xl z-10 flex-none">
                        <div className="flex items-center justify-between mb-4">
                            <button onClick={onBack} className="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/20"><i className="fas fa-arrow-left text-xs"></i></button>
                            <h3 className="font-black text-gold-gradient tracking-wide">RIWAYAT EVALUASI</h3>
                            <button onClick={loadData} className="w-8 h-8 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400 hover:bg-blue-500/20"><i className="fas fa-sync"></i></button>
                        </div>
                        <div className="relative">
                            <input placeholder="Cari pelatih, tanggal, jam, atau isi..." className="w-full p-3 bg-white/5 border border-white/10 rounded-xl text-sm text-white focus:border-[#FFD700] outline-none" value={search} onChange={e => setSearch(e.target.value)} />
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                        {!evals ? <div className="text-center py-10"><div className="loader mx-auto"></div></div> : filteredKeys.length === 0 ? <div className="text-center text-slate-500 py-10 font-medium">Data tidak ditemukan.</div> : <div className="space-y-3">{filteredKeys.map(dateKey => (<div key={dateKey} onClick={() => onSelectDate(evals[dateKey])} className="p-4 bg-white/5 border border-white/10 rounded-xl hover:bg-blue-500/20 hover:border-blue-400/50 cursor-pointer transition-all group hover:scale-[1.02] duration-200"><div className="flex justify-between items-center"><div><div className="font-bold text-white text-sm">{evals[dateKey].display}</div><div className="text-[10px] text-slate-400 mt-1 font-medium">{evals[dateKey].list.length} Catatan Masuk</div></div><i className="fas fa-chevron-right text-slate-600 group-hover:text-[#FFD700]"></i></div></div>))}</div>}
                    </div>
                </div>
            );
        }

        function PaskibEvalDetail({ data, user, onBack, isAdmin, onPhotoClick }) {
            const [replies, setReplies] = useState({}); 
            const [input, setInput] = useState({}); 
            const [search, setSearch] = useState(''); 
            
            useEffect(() => { 
                data.list.forEach(item => { api.run('getReplies', item.id).then(res => setReplies(prev => ({...prev, [item.id]: res}))); }); 
            }, [data]); 
            
            const handleSendReply = async (evalId) => { 
                const text = input[evalId]; 
                if (!text) return; 
                await api.run('submitReply', evalId, user.nik, text); 
                const newReplies = await api.run('getReplies', evalId); 
                setReplies(prev => ({...prev, [evalId]: newReplies})); 
                setInput(prev => ({...prev, [evalId]: ''})); 
            }; 
            
            const filteredList = data.list.filter(item => { 
                const q = search.toLowerCase(); 
                return item.pelatih.toLowerCase().includes(q) || item.koreksiTehnik.toLowerCase().includes(q) || item.koreksiSikap.toLowerCase().includes(q) || (item.teguran && item.teguran.toLowerCase().includes(q)); 
            });

            return (
                <div className="os-window p-0 rounded-[2rem] h-[85vh] flex flex-col overflow-hidden animate-in">
                    <div className="flex items-center gap-4 p-5 border-b border-white/10 bg-[#050505]/80 backdrop-blur-xl z-10 flex-none">
                        <button onClick={onBack} className="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/20 hover:border-white/30 text-white transition-all shadow-[0_0_10px_rgba(0,0,0,0.5)]">
                            <i className="fas fa-arrow-left text-sm"></i>
                        </button>
                        <div className="flex-1">
                            <h3 className="font-black text-white text-base tracking-wide drop-shadow-md">{data.display}</h3>
                            <div className="flex items-center gap-2 mt-0.5">
                                <span className="w-1.5 h-1.5 rounded-full bg-[#FFD700] shadow-[0_0_5px_#FFD700]"></span>
                                <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">DETAIL KOREKSIAN</div>
                            </div>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-5 custom-scrollbar bg-black/20">
                        <div className="mb-6 relative">
                             <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                             <input placeholder="Cari pelatih, materi, atau teguran..." className="w-full pl-10 pr-4 py-3.5 bg-black/40 border border-white/10 rounded-2xl text-sm text-white focus:border-[#FFD700]/50 outline-none transition shadow-inner font-medium placeholder-slate-600" value={search} onChange={e => setSearch(e.target.value)} />
                        </div>
                        <div className="space-y-6 pb-10">
                            {filteredList.length === 0 ? (
                                <div className="text-center text-slate-500 py-12 flex flex-col items-center justify-center opacity-60">
                                    <div className="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-4 border border-white/5"><i className="far fa-folder-open text-2xl"></i></div>
                                    <span className="text-xs font-bold tracking-wider">TIDAK ADA DATA</span>
                                </div> 
                            ) : (
                                filteredList.map((item, idx) => (
                                    <div key={idx} className="bg-[#0f1423]/60 border border-white/10 rounded-2xl relative overflow-hidden shadow-lg group hover:border-white/20 transition-all duration-300">
                                        <div className="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-[#D4AF37] to-[#b45309] z-20 shadow-[0_0_10px_rgba(212,175,55,0.3)]"></div>
                                        <div className="flex items-center gap-3 p-4 bg-white/5 border-b border-white/5">
                                            <div className="relative cursor-pointer hover:scale-105 transition-transform" onClick={() => onPhotoClick(item.fotoPelatih || 'https://via.placeholder.com/150?text=Pelatih', item.jabatan, 'badge-gold')}>
                                                <img src={item.fotoPelatih || 'https://via.placeholder.com/150?text=Pelatih'} onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150?text=No+Img'; }} className="w-11 h-11 rounded-full border-2 border-[#FFD700]/50 object-cover shadow-md" />
                                                <div className="absolute -bottom-1 -right-1 px-1.5 py-0.5 rounded bg-black text-[6px] font-black text-white badge-gold border border-[#FFD700] uppercase tracking-wider">{item.jabatan || 'Pelatih'}</div>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="text-white font-bold text-sm truncate">{item.pelatih}</div>
                                                <div className="text-[10px] text-slate-400 uppercase tracking-wider font-bold truncate">{item.jabatan}</div>
                                            </div>
                                            <div className="text-[10px] bg-black/60 border border-white/10 px-2.5 py-1 rounded-lg text-[#FFD700] font-bold shadow-inner tracking-wide"><i className="far fa-clock mr-1"></i>{item.waktu}</div>
                                        </div>
                                        <div className="p-5 space-y-3.5 text-sm text-slate-300 font-medium">
                                            <div className="p-3.5 bg-black/30 rounded-xl border border-white/5 relative overflow-hidden">
                                                <div className="absolute top-0 left-0 w-0.5 h-full bg-blue-500/50"></div>
                                                <div className="text-[10px] text-blue-400 font-black mb-1.5 uppercase tracking-widest flex items-center gap-1.5"><i className="fas fa-running"></i> TEHNIK</div>
                                                <div className="leading-relaxed">{item.koreksiTehnik}</div>
                                            </div>
                                            <div className="p-3.5 bg-black/30 rounded-xl border border-white/5 relative overflow-hidden">
                                                <div className="absolute top-0 left-0 w-0.5 h-full bg-green-500/50"></div>
                                                <div className="text-[10px] text-green-400 font-black mb-1.5 uppercase tracking-widest flex items-center gap-1.5"><i className="fas fa-user-check"></i> SIKAP</div>
                                                <div className="leading-relaxed">{item.koreksiSikap}</div>
                                            </div>
                                            {(item.teguran && item.teguran !== '-') && (<div className="p-3.5 bg-red-900/10 rounded-xl border border-red-500/20 relative overflow-hidden"><div className="absolute top-0 left-0 w-0.5 h-full bg-red-500/50"></div><div className="text-[10px] text-red-400 font-black mb-1.5 uppercase tracking-widest flex items-center gap-1.5"><i className="fas fa-exclamation-triangle"></i> TEGURAN</div><div className="leading-relaxed text-red-200/80">{item.teguran}</div></div>)}
                                            
                                            {(item.stars > 0 || (item.prestasi && item.prestasi !== '-')) && (
                                                <div className="p-3.5 bg-cyan-900/10 rounded-xl border border-cyan-500/20 relative overflow-hidden">
                                                    <div className="absolute top-0 left-0 w-0.5 h-full bg-cyan-500/50"></div>
                                                    <div className="flex justify-between items-center mb-1.5">
                                                        <div className="text-[10px] text-cyan-400 font-black uppercase tracking-widest flex items-center gap-1.5"><i className="fas fa-trophy"></i> PRESTASI</div>
                                                        {item.stars > 0 && <StarRating count={item.stars} />}
                                                    </div>
                                                    {(item.prestasi && item.prestasi !== '-') && <div className="leading-relaxed text-cyan-200/80">{item.prestasi}</div>}
                                                </div>
                                            )}

                                            {item.media && (<button onClick={() => onPhotoClick(item.media, 'Lampiran', 'badge-base')} className="w-full block text-center py-2.5 bg-blue-600/10 text-blue-400 text-xs rounded-xl border border-blue-600/30 hover:bg-blue-600/20 font-bold transition flex items-center justify-center gap-2"><i className="fas fa-paperclip"></i> LIHAT LAMPIRAN</button>)}
                                        </div>
                                        <div className="bg-black/20 p-4 border-t border-white/5">
                                            <div className="flex items-center gap-2 mb-3"><i className="fas fa-comments text-slate-500 text-xs"></i><div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">BALASAN</div></div>
                                            <div className="space-y-2 mb-4">{replies[item.id] && replies[item.id].length > 0 ? replies[item.id].map((r, i) => (<div key={i} className="text-xs bg-[#FFD700]/10 text-[#FFD700] p-3 rounded-xl rounded-tr-none border border-[#FFD700]/20 font-medium ml-4 relative">{r.text}</div>)) : <div className="text-[10px] text-slate-600 italic pl-1">Belum ada balasan</div>}</div>
                                            {!isAdmin && (<div className="flex gap-2"><input disabled={input.sending} type="text" placeholder="Tulis balasan..." className="flex-1 bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-xs font-medium text-white focus:border-[#FFD700]/30 outline-none disabled:opacity-50" value={input[item.id]||''} onChange={e => setInput({...input, [item.id]: e.target.value})} /><button disabled={input.sending} onClick={() => handleSendReply(item.id)} className="bg-gradient-to-r from-[#D4AF37] to-[#b45309] text-black w-9 h-9 rounded-xl flex items-center justify-center hover:scale-105 transition-transform shadow-lg disabled:opacity-50 disabled:scale-100"><i className="fas fa-paper-plane text-xs"></i></button></div>)}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function StarHistoryList({ data, onBack }) {
            return (
                <div className="os-window p-0 rounded-[2rem] h-[85vh] flex flex-col overflow-hidden animate-in">
                    <div className="p-5 border-b border-white/10 bg-[#050505]/80 backdrop-blur-xl z-10 flex-none flex items-center justify-between">
                        <button onClick={onBack} className="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/20">
                            <i className="fas fa-arrow-left text-xs text-white"></i>
                        </button>
                        <h3 className="font-black text-gold-gradient tracking-wide text-sm">RIWAYAT BINTANG</h3>
                        <div className="w-8"></div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-5 custom-scrollbar bg-black/20 space-y-4">
                        {data.length === 0 ? (
                            <div className="text-center text-slate-500 py-10 text-xs">Belum ada riwayat bintang.</div>
                        ) : (
                            data.map((item, idx) => {
                                const isNegative = item.stars < 0;
                                const borderColor = isNegative ? 'border-red-500/30' : 'border-[#FFD700]/30';
                                const bgColor = isNegative ? 'bg-red-900/10' : 'bg-[#0f1423]/60';
                                const starColor = isNegative ? 'text-red-500' : 'text-[#FFD700]';
                                
                                return (
                                    <div key={idx} className={`${bgColor} border ${borderColor} rounded-xl p-4 relative overflow-hidden group`}>
                                        <div className="absolute top-0 right-0 p-2 opacity-10"><i className={`fas fa-star text-4xl ${starColor}`}></i></div>
                                        <div className="flex justify-between items-start mb-2 relative z-10">
                                            <div>
                                                <div className="font-bold text-white text-sm">{item.pelatih}</div>
                                                <div className="text-[10px] text-slate-400 uppercase font-bold tracking-wider">{item.jabatan}</div>
                                            </div>
                                            <div className="text-right">
                                                <StarRating count={item.stars} />
                                                <div className={`text-[9px] mt-1 font-bold ${starColor}`}>{item.tanggal}</div>
                                            </div>
                                        </div>
                                        <div className="relative z-10 p-3 bg-black/40 rounded-lg border border-white/5 mt-2">
                                            <div className="text-[10px] text-slate-500 font-bold mb-1 uppercase tracking-wide">
                                                {isNegative ? 'ALASAN PENGURANGAN' : 'KETERANGAN'}
                                            </div>
                                            <div className="text-xs text-white italic">"{item.keterangan}"</div>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>
                </div>
            );
        }

        function EditProfile({ user, role, onBack, onSuccess }) { 
            const [pass, setPass] = useState(''); 
            const [file, setFile] = useState(null); 
            const [loading, setLoading] = useState(false);

            const handleSave = () => { 
                if (!pass && !file) return alert("Tidak ada perubahan"); 
                
                setLoading(true);
                const payload = { password: pass }; 
                
                const send = (p) => { 
                    const id = role === 'paskibraka' ? user.nik : user.username; 
                    api.run('updateProfile', role, id, p).then(res => { 
                        setLoading(false);
                        alert(res.message); 
                        if(res.status === 'success') {
                            onSuccess(pass);
                        }
                    }); 
                }; 
                
                if(file) { 
                    const r = new FileReader(); 
                    r.onload = e => { 
                        payload.fotoData = e.target.result.split(',')[1]; 
                        payload.fotoMime = file.type; 
                        send(payload); 
                    }; 
                    r.readAsDataURL(file); 
                } else send(payload); 
            }; 
            
            return (
                <div className="os-window p-0 rounded-[2rem] h-[85vh] flex flex-col overflow-hidden animate-in">
                    <div className="p-6 pb-4 border-b border-white/10 bg-[#050505]/80 backdrop-blur-xl z-10 flex-none text-center">
                        <h3 className="font-black text-white uppercase tracking-tight">EDIT PROFIL</h3>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                        <input disabled={loading} placeholder="Password Baru (Kosongkan jika tetap)" type="password" className="w-full p-3 os-input rounded-xl text-sm font-medium" onChange={e => setPass(e.target.value)} />
                        <div>
                            <label className="text-xs text-slate-400 mb-1 block font-bold">Ganti Foto Profil</label>
                            <input disabled={loading} type="file" accept="image/*" className="w-full p-2 os-input rounded-xl text-xs" onChange={e => setFile(e.target.files[0])} />
                        </div>
                    </div>
                    <div className="p-4 border-t border-white/10 bg-[#050505]/80 z-10 flex-none flex gap-3">
                        <button disabled={loading} onClick={onBack} className="flex-1 py-3 text-xs font-bold text-slate-400 hover:text-white">BATAL</button>
                        <button onClick={handleSave} disabled={loading} className="flex-1 btn-gold py-3 rounded-xl text-xs font-bold flex justify-center items-center gap-2">
                            {loading ? <i className="fas fa-spinner fa-spin"></i> : "SIMPAN"}
                        </button>
                    </div>
                </div>
            ); 
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PaskibApp />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Raport Paskibraka</title>
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/a/a0/Logo_dppi_512.png">
    
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script type="text/babel" src="shared.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function LoginApp() {
            const [view, setView] = useState('login');
            const [loading, setLoading] = useState(false);
            
            // --- FIX BLANK SCREEN: SISTEM MENUNGGU SHARED.JS ---
            const [isReady, setIsReady] = useState(false);
            useEffect(() => {
                let attempts = 0;
                const timer = setInterval(() => {
                    attempts++;
                    // Cek apakah shared.js sudah selesai dibaca oleh browser
                    if (window.Background3D && window.api) {
                        setIsReady(true);
                        clearInterval(timer);
                    } else if (attempts > 100) { // Timeout jika gagal setelah 10 detik
                        clearInterval(timer);
                        alert("Gagal memuat sistem. Harap periksa koneksi internet Anda atau refresh halaman.");
                    }
                }, 100);
                return () => clearInterval(timer);
            }, []);

            const handleLogin = async (username, password, type) => {
                setLoading(true);
                try {
                    const res = await window.api.run('loginUser', username, password, type);
                    if (res && res.status === 'success') {
                        localStorage.setItem('currentUser', JSON.stringify({
                            data: res.data,
                            role: res.role || type
                        }));
                        
                        let targetPage = 'index.html';
                        if(res.role === 'admin') targetPage = 'admin.html';
                        else if(type === 'paskibraka') targetPage = 'paskibraka.html';
                        else targetPage = 'pelatih.html';

                        window.location.href = targetPage;
                    } else {
                        alert(res.message || "Gagal login");
                    }
                } catch (e) { alert(e.message); }
                setLoading(false);
            };

            // JIKA BELUM READY, TAMPILKAN LOADER (MENCEGAH CRASH HITAM)
            if (!isReady) return <div className="min-h-screen flex flex-col items-center justify-center bg-[#050505]"><div className="loader mb-4"></div><p className="text-[#FFD700] text-xs font-bold tracking-widest animate-pulse">SINKRONISASI APLIKASI...</p></div>;

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <window.Background3D />
                    <div className="w-full max-w-lg relative z-0 mt-10 mb-10">
                        {view === 'login' ? <LoginView onLogin={handleLogin} onGoRegister={() => setView('register')} loading={loading} /> : <RegisterView onBack={() => setView('login')} />}
                    </div>
                </div>
            );
        }

        function LoginView({ onLogin, onGoRegister, loading }) {
            const [tab, setTab] = useState('paskibraka'); 
            const [form, setForm] = useState({ user: '', pass: '' }); 
            const [showPass, setShowPass] = useState(false); 
            const [bioEnabled, setBioEnabled] = useState(false);
            const [savedCreds, setSavedCreds] = useState(null); 
            const [isBiometricActive, setIsBiometricActive] = useState(false);
            const [biometricType, setBiometricType] = useState('finger');

            useEffect(() => {
                const isEnabled = localStorage.getItem('paskib_bio_enabled') === 'true';
                setBioEnabled(isEnabled);
                const creds = localStorage.getItem('bio_creds');
                if (isEnabled && creds) {
                    const parsedCreds = JSON.parse(creds);
                    setSavedCreds(parsedCreds);
                    setTab(parsedCreds.role);
                }
            }, []);

            const handleBiometricLogin = (type) => {
                if (!savedCreds) return alert("Sesi tidak valid. Silakan login manual sekali lagi.");
                setBiometricType(type); setIsBiometricActive(true);
                setTimeout(() => {
                    setIsBiometricActive(false);
                    onLogin(savedCreds.user, savedCreds.pass, savedCreds.role);
                }, 1500); 
            };

            return (
                <div className="os-window p-8 rounded-[2rem] animate-in text-center relative overflow-hidden">
                    {isBiometricActive && (
                        <div className="biometric-scanner-overlay animate-in">
                            <div className="flex flex-col items-center">
                                <div className="relative mb-8">
                                    {biometricType === 'face' ? (
                                        <div className="face-id-frame"><i className="fas fa-user text-6xl text-white opacity-20"></i><div className="face-id-scanner"></div></div>
                                    ) : (
                                        <div className="bio-icon-container"><i className="fas fa-fingerprint fingerprint-icon"></i><div className="fingerprint-active"><i className="fas fa-fingerprint"></i></div></div>
                                    )}
                                </div>
                                <h3 className="text-white font-black text-xl uppercase tracking-[0.2em] mb-2 animate-pulse">{biometricType === 'face' ? 'Memindai Wajah' : 'Memindai Sidik Jari'}</h3>
                                <p className="text-gold-light text-[10px] font-bold uppercase tracking-[0.4em] opacity-80">Verifikasi Identitas...</p>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-center items-center gap-0 mb-8 filter drop-shadow-[0_0_15px_rgba(255,215,0,0.3)]">
                        <img src={window.LOGO_DPPI} className="h-14 drop-shadow-xl object-contain -mr-6 relative z-0" />
                        <img src={window.LOGO_YOGYA} className="h-20 drop-shadow-2xl z-10 scale-110 object-contain -mx-4" />
                        <img src={window.LOGO_PASKIB} className="h-14 drop-shadow-xl object-contain -ml-6 relative z-0 scale-125" />
                    </div>
                    <h2 className="text-3xl font-black mb-2 text-white uppercase tracking-tight drop-shadow-lg" style={{textShadow: "0 0 20px rgba(255,215,0,0.3)"}}>RAPORT <span className="text-gold-gradient">DIGITAL</span></h2>
                    <p className="text-blue-300 text-xs mb-8 tracking-[0.4em] font-bold uppercase opacity-80 drop-shadow">PASKIBRAKA KOTA YOGYAKARTA 2026</p>
                    
                    <div className="flex p-1 bg-black/40 rounded-xl mb-6 border border-white/10 inner-shadow">
                        {['paskibraka', 'pelatih', 'admin'].map(t => (<button key={t} disabled={loading} onClick={() => setTab(t)} className={`flex-1 py-2 text-xs font-bold uppercase rounded-lg transition-all ${tab === t ? 'bg-gradient-to-r from-[#D4AF37] to-[#FFD700] text-black shadow-[0_0_15px_rgba(212,175,55,0.5)]' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>{t}</button>))}
                    </div>
                    
                    <div className="space-y-4 text-left">
                        <div className="relative"><i className="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i><input type="text" disabled={loading} placeholder={tab === 'paskibraka' ? "NIK Paskibraka" : "Username"} className="w-full pl-10 pr-4 py-3 os-input rounded-xl text-sm font-medium" value={form.user} onChange={e => setForm({...form, user: e.target.value})} /></div>
                        <div className="relative"><i className="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i><input type={showPass ? "text" : "password"} disabled={loading} placeholder="Password" className="w-full pl-10 pr-10 py-3 os-input rounded-xl text-sm font-medium" value={form.pass} onChange={e => setForm({...form, pass: e.target.value})} /><button type="button" disabled={loading} onClick={() => setShowPass(!showPass)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-gold-primary transition"><i className={`fas ${showPass ? 'fa-eye-slash' : 'fa-eye'}`}></i></button></div>
                        <button onClick={() => onLogin(form.user, form.pass, tab)} disabled={loading} className="w-full btn-gold py-3 rounded-xl text-sm font-black uppercase tracking-widest mt-4 flex justify-center items-center gap-2">{loading ? <div className="loader w-4 h-4"></div> : "LOGIN SYSTEM"}</button>
                    </div>
                    
                    {bioEnabled && savedCreds && savedCreds.role === tab && (
                        <div className="mt-6 pt-6 border-t border-white/10 animate-in">
                            <p className="text-[10px] text-slate-400 mb-3 uppercase tracking-widest font-bold">Atau login cepat dengan</p>
                            <div className="flex justify-center gap-4">
                                <button type="button" onClick={() => handleBiometricLogin('face')} disabled={loading} className="p-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 hover:border-[#FFD700]/30 transition-all flex flex-col items-center gap-2 group w-20"><i className="fas fa-expand text-2xl text-slate-400 group-hover:text-[#FFD700] transition-colors"></i><span className="text-[8px] font-black text-slate-300 uppercase tracking-wider">Face ID</span></button>
                                <button type="button" onClick={() => handleBiometricLogin('finger')} disabled={loading} className="p-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 hover:border-[#FFD700]/30 transition-all flex flex-col items-center gap-2 group w-20"><i className="fas fa-fingerprint text-2xl text-slate-400 group-hover:text-[#FFD700] transition-colors"></i><span className="text-[8px] font-black text-slate-300 uppercase tracking-wider">Sidik Jari</span></button>
                            </div>
                        </div>
                    )}
                    <div className="mt-6 text-xs text-slate-400">Belum punya akun? <button disabled={loading} onClick={onGoRegister} className="text-[#FFD700] hover:underline font-bold hover:text-white transition">REGISTRASI</button></div>
                </div>
            );
        }

        function RegisterView({ onBack }) {
            const [type, setType] = useState('paskibraka'); const [form, setForm] = useState({ penugasan: "", jabatan: "" }); const [file, setFile] = useState(null); const [isLoading, setIsLoading] = useState(false);
            const JABATAN_OPTIONS = [ "KOOR TEHNIK", "WAKOOR TEHNIK", "KOOR PEMBINAAN","KOOR KESEHATAN", "KOOR BENDERA", "KOOR NAMPAN", "KOOR PASUKAN 17", "WAKOOR PASUKAN 17", "KOOR PASUKAN 8","KOOR ASRAMA","KOOR PDD","STAFF" ];
            const handleSubmit = async () => { 
                if (!form[type==='paskibraka'?'nik':'username']) return alert("ID/Username Wajib Diisi"); if (!form.nama) return alert("Nama Lengkap Wajib Diisi"); if (!form.lapangan) return alert("Nama Lapangan Wajib Diisi"); if (!form.password) return alert("Password Wajib Diisi"); if (!file) return alert("Foto Profil Wajib Diisi"); 
                if (type === 'paskibraka') { if (!form.sekolah) return alert("Asal Sekolah Wajib Diisi"); if (!form.penugasan) return alert("Penugasan Wajib Dipilih"); } else { if (!form.jabatan) return alert("Jabatan Wajib Dipilih"); } 
                setIsLoading(true); 
                const reader = new FileReader(); 
                reader.onload = async (e) => { 
                    const base64 = e.target.result.split(',')[1]; 
                    const payload = { ...form, fotoData: base64, fotoMime: file.type }; 
                    try { 
                        const method = type === 'paskibraka' ? 'registerPaskibraka' : 'registerPelatih'; 
                        const res = await window.api.run(method, payload); 
                        alert(res.message); 
                        if (res.status === 'success') onBack(); 
                    } catch (err) { alert(err.message); } 
                    setIsLoading(false); 
                }; 
                reader.readAsDataURL(file); 
            };
            return (
                <div className="os-window p-0 rounded-[2rem] h-[85vh] flex flex-col overflow-hidden animate-in">
                    <div className="p-6 pb-4 border-b border-white/10 bg-[#050505]/80 backdrop-blur-xl z-10 flex-none text-center">
                        <div className="text-[10px] tracking-[0.3em] font-bold text-slate-400 uppercase mb-2">FORMULIR PENDAFTARAN</div>
                        <h2 className="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#D4AF37] via-[#FFD700] to-[#D4AF37] uppercase tracking-wide drop-shadow-md">REGISTRASI {type.toUpperCase()}</h2>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-3 custom-scrollbar">
                        <div><label className="block text-slate-400 mb-1 text-xs font-bold">Tipe Akun</label><select disabled={isLoading} className="w-full p-3 os-select rounded-xl font-medium" value={type} onChange={e => setType(e.target.value)}><option value="paskibraka" className="text-black">Paskibraka</option><option value="pelatih" className="text-black">Pelatih</option></select></div>
                        <input disabled={isLoading} placeholder={type === 'paskibraka' ? "NIK (Wajib)" : "Username (Wajib)"} className="w-full p-3 os-input rounded-xl font-medium" onChange={e => setForm({...form, [type === 'paskibraka'?'nik':'username']: e.target.value})} />
                        <input disabled={isLoading} placeholder="Nama Lengkap (Wajib)" className="w-full p-3 os-input rounded-xl font-medium" onChange={e => setForm({...form, nama: e.target.value})} />
                        <input disabled={isLoading} placeholder="Nama Lapangan (Wajib)" className="w-full p-3 os-input rounded-xl font-medium" onChange={e => setForm({...form, lapangan: e.target.value})} />
                        {type === 'paskibraka' ? (<><input disabled={isLoading} placeholder="Asal Sekolah (Wajib)" className="w-full p-3 os-input rounded-xl font-medium" onChange={e => setForm({...form, sekolah: e.target.value})} /><select disabled={isLoading} className="w-full p-3 os-select rounded-xl font-medium" value={form.penugasan} onChange={e => setForm({...form, penugasan: e.target.value})}><option value="" disabled selected className="text-slate-500">Pilih Penugasan (Wajib)</option><option value="Kota" className="text-black">Kota Yogyakarta</option><option value="Provinsi" className="text-black">Provinsi DIY</option><option value="Nasional" className="text-black">Nasional</option></select></>) : (<select disabled={isLoading} className="w-full p-3 os-select rounded-xl font-medium" value={form.jabatan} onChange={e => setForm({...form, jabatan: e.target.value})}><option value="" disabled selected className="text-slate-500">Pilih Jabatan (Wajib)</option>{JABATAN_OPTIONS.map(j => <option key={j} value={j} className="text-black">{j}</option>)}</select>)}
                        <input disabled={isLoading} type="password" placeholder="Password (Wajib)" className="w-full p-3 os-input rounded-xl font-medium" onChange={e => setForm({...form, password: e.target.value})} />
                        <div><label className="block text-slate-400 mb-1 text-xs font-bold">Foto Profil (Wajib)</label><input disabled={isLoading} type="file" accept="image/*" className="w-full p-2 os-input rounded-xl text-xs" onChange={e => setFile(e.target.files[0])} /></div>
                    </div>
                    <div className="p-4 border-t border-white/10 bg-[#050505]/80 z-10 flex-none flex gap-3">
                        <button disabled={isLoading} onClick={onBack} className="flex-1 py-3 rounded-xl border border-white/20 hover:bg-white/10 text-xs font-bold transition">BATAL</button>
                        <button onClick={handleSubmit} disabled={isLoading} className="flex-1 btn-gold py-3 rounded-xl text-xs font-bold flex justify-center">{isLoading ? <div className="loader w-4 h-4"></div> : "DAFTAR SEKARANG"}</button>
                    </div>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LoginApp />);
    </script>
</body>
</html>
